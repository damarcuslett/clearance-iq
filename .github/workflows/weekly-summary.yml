name: Weekly Summary

on:
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly summary cron endpoint
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/weekly-summary"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
